                - generic [ref=e107]:
                  - heading "PGlite - Postgres in WASM" [level=1] [ref=e108]
                  - 'link "Permalink: PGlite - Postgres in WASM" [ref=e109] [cursor=pointer]':
                    - /url: "#pglite---postgres-in-wasm"
                - paragraph [ref=e110]:
                  - link "PGlite" [ref=e111] [cursor=pointer]:
                    - /url: https://raw.githubusercontent.com/electric-sql/pglite/main/screenshot.png
                    - img "PGlite" [ref=e112]
                - paragraph [ref=e113]:
                  - text: PGlite is a WASM Postgres build packaged into a TypeScript client library that enables you to run Postgres in the browser, Node.js, Bun and Deno, with no need to install any other dependencies. It is only 3mb gzipped and has support for many Postgres extensions, including
                  - link "pgvector" [ref=e114] [cursor=pointer]:
                    - /url: https://github.com/pgvector/pgvector
                  - text: .
                - generic [ref=e116]: "import { PGlite } from '@electric-sql/pglite' const db = new PGlite() await db.query(\"select 'Hello world' as message;\") // -> { rows: [ { message: \"Hello world\" } ] }"
                - paragraph [ref=e117]: It can be used as an ephemeral in-memory database, or with persistence either to the file system (Node/Bun/Deno) or indexedDB (Browser).
                - paragraph [ref=e118]: Unlike previous "Postgres in the browser" projects, PGlite does not use a Linux virtual machine - it is simply Postgres in WASM.
                - paragraph [ref=e119]:
                  - text: For full documentation and user guides see
                  - link "pglite.dev" [ref=e120] [cursor=pointer]:
                    - /url: https://pglite.dev
                  - text: .
                - generic [ref=e121]:
                  - heading "Browser" [level=2] [ref=e122]
                  - 'link "Permalink: Browser" [ref=e123] [cursor=pointer]':
                    - /url: "#browser"
                - paragraph [ref=e124]: "It can be installed and imported using your usual package manager:"
                - generic [ref=e126]: "import { PGlite } from '@electric-sql/pglite'"
                - paragraph [ref=e127]: "or using a CDN such as JSDeliver:"
                - generic [ref=e129]: "import { PGlite } from 'https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js'"
                - paragraph [ref=e130]: "Then for an in-memory Postgres:"
                - generic [ref=e132]: "const db = new PGlite() await db.query(\"select 'Hello world' as message;\") // -> { rows: [ { message: \"Hello world\" } ] }"
                - paragraph [ref=e133]: "or to persist the database to indexedDB:"
                - generic [ref=e135]: const db = new PGlite('idb://my-pgdata')
                - generic [ref=e136]:
                  - heading "Node/Bun/Deno" [level=2] [ref=e137]
                  - 'link "Permalink: Node/Bun/Deno" [ref=e138] [cursor=pointer]':
                    - /url: "#nodebundeno"
                - paragraph [ref=e139]: "Install into your project:"
                - paragraph [ref=e140]:
                  - strong [ref=e141]: NodeJS
                - generic [ref=e143]: npm install @electric-sql/pglite
                - paragraph [ref=e144]:
                  - strong [ref=e145]: Bun
                - generic [ref=e147]: bun install @electric-sql/pglite
                - paragraph [ref=e148]:
                  - strong [ref=e149]: Deno
                - generic [ref=e151]: deno add npm:@electric-sql/pglite
                - paragraph [ref=e152]: "To use the in-memory Postgres:"
                - generic [ref=e154]: "import { PGlite } from '@electric-sql/pglite' const db = new PGlite() await db.query(\"select 'Hello world' as message;\") // -> { rows: [ { message: \"Hello world\" } ] }"
                - paragraph [ref=e155]: "or to persist to the filesystem:"
                - generic [ref=e157]: const db = new PGlite('./path/to/pgdata')
                - generic [ref=e158]:
                  - heading "How it works" [level=2] [ref=e159]
                  - 'link "Permalink: How it works" [ref=e160] [cursor=pointer]':
                    - /url: "#how-it-works"
                - paragraph [ref=e161]: PostgreSQL typically operates using a process forking model; whenever a client initiates a connection, a new process is forked to manage that connection. However, programs compiled with Emscripten - a C to WebAssembly (WASM) compiler - cannot fork new processes, and operates strictly in a single-process mode. As a result, PostgreSQL cannot be directly compiled to WASM for conventional operation.
                - paragraph [ref=e162]: Fortunately, PostgreSQL includes a "single user mode" primarily intended for command-line usage during bootstrapping and recovery procedures. Building upon this capability, PGlite introduces a input/output pathway that facilitates interaction with PostgreSQL when it is compiled to WASM within a JavaScript environment.
                - generic [ref=e163]:
                  - heading "Limitations" [level=2] [ref=e164]
                  - 'link "Permalink: Limitations" [ref=e165] [cursor=pointer]':
                    - /url: "#limitations"
                - list [ref=e166]:
                  - listitem [ref=e167]: PGlite is single user/connection.
                - generic [ref=e168]:
                  - heading "How to build PGlite and contribute" [level=2] [ref=e169]
                  - 'link "Permalink: How to build PGlite and contribute" [ref=e170] [cursor=pointer]':
                    - /url: "#how-to-build-pglite-and-contribute"
                - paragraph [ref=e171]: "The build process of PGlite is split into two parts:"
                - list [ref=e172]:
                  - listitem [ref=e173]: Building the Postgres WASM module.
                  - listitem [ref=e174]: Building the PGlite client library and other TypeScript packages.
                - paragraph [ref=e175]:
                  - text: Docker is required to build the WASM module, along with Node (v20 or above) and
                  - link "pnpm" [ref=e176] [cursor=pointer]:
                    - /url: https://pnpm.io/
                  - text: for package management and building the TypeScript packages.
                - paragraph [ref=e177]: "To start checkout the repository and install dependencies:"
                - generic [ref=e179]: git clone https://github.com/electric-sql/pglite cd pglite pnpm install
                - paragraph [ref=e180]:
                  - text: To build everything, we have the convenient
                  - code [ref=e181]: pnpm build:all
                  - text: "command in the root of the repository. This command will:"
                - list [ref=e182]:
                  - listitem [ref=e183]:
                    - text: Use Docker to build the Postgres WASM module. The artifacts from this are then copied to
                    - code [ref=e184]: /packages/pglite/release
                    - text: .
                  - listitem [ref=e185]: Build the PGlite client library and other TypeScript packages.
                - paragraph [ref=e186]:
                  - text: To
                  - emphasis [ref=e187]: only
                  - text: build the Postgres WASM module (i.e. point 1 above), run
                - generic [ref=e189]: pnpm wasm:build
                - paragraph [ref=e190]:
                  - text: If you don't want to build the WASM module and assorted WASM binaries from scratch, you can download them from a comment under the most recently merged PR, labeled as
                  - emphasis [ref=e191]: interim build files
                  - text: ", and place them under"
                  - code [ref=e192]: packages/pglite/release
                  - text: .
                - paragraph [ref=e193]: "To build all TypeScript packages (i.e. point 2 of the above), run:"
                - generic [ref=e195]: pnpm ts:build
                - paragraph [ref=e196]:
                  - text: This will build all packages in the correct order based on their dependency relationships. You can now develop any individual package using the
                  - code [ref=e197]: build
                  - text: and
                  - code [ref=e198]: test
                  - text: scripts, as well as the
                  - code [ref=e199]: stylecheck
                  - text: and
                  - code [ref=e200]: typecheck
                  - text: scripts to ensure style and type validity.
                - paragraph [ref=e201]: "Or alternatively to build a single package, move into the package directory and run:"
                - generic [ref=e203]: cd packages/pglite pnpm build
                - paragraph [ref=e204]: "When ready to open a PR, run the following command at the root of the repository:"
                - generic [ref=e206]: pnpm changeset
                - paragraph [ref=e207]: And follow the instructions to create an appropriate changeset. Please ensure any contributions that touch code are accompanied by a changeset.
                - generic [ref=e208]:
