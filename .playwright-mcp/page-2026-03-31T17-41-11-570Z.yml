                - generic [ref=e609]: "$ node ./examples/pizza --help Usage: pizza [options] An application for pizza ordering Options: -p, --peppers Add peppers -c, --cheese <type> Add the specified type of cheese (default: \"marble\") -C, --no-cheese You do not want any cheese -h, --help display help for command"
                - paragraph [ref=e610]:
                  - text: A
                  - code [ref=e611]: help
