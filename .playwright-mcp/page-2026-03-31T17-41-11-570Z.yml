                - paragraph [ref=e252]:
                  - text: Options are defined with the
                  - code [ref=e253]: .option()
                  - text: method, also serving as documentation for the options. Each option can have a short flag (single character) and a long name, separated by a comma, a space, or a vertical bar (
                  - code [ref=e254]: "|"
                  - text: ). To allow a wider range of short-ish flags than just single characters, you may also have two long options.
                - generic [ref=e256]: program .option('-p, --port <number>', 'server port number') .option('--trace', 'add extra debugging output') .option('--ws, --workspace <name>', 'use a custom workspace')
                - paragraph [ref=e257]:
                  - text: The parsed options can be accessed by calling
                  - code [ref=e258]: .opts()
                  - text: on a
                  - code [ref=e259]: Command
                  - text: object, and are passed to the action handler.
                - paragraph [ref=e260]:
                  - text: Multi-word options like
                  - code [ref=e261]: "--template-engine"
                  - text: are normalized to camelCase option names, resulting in properties such as
                  - code [ref=e262]: program.opts().templateEngine
                  - text: .
                - paragraph [ref=e263]:
                  - text: An option and its option-argument can be separated by a space, or combined into the same argument. The option-argument can follow the short option directly, or follow an
                  - code [ref=e264]: =
                  - text: for a long option.
                - generic [ref=e266]: serve -p 80 serve -p80 serve --port 80 serve --port=80
                - paragraph [ref=e267]:
                  - text: You can use
                  - code [ref=e268]: "--"
                  - text: to indicate the end of the options, and any remaining arguments will be used without being interpreted.
                - paragraph [ref=e269]: By default, options on the command line are not positional, and can be specified before or after other arguments.
                - paragraph [ref=e270]:
                  - text: There are additional related routines for when
                  - code [ref=e271]: .opts()
                  - text: "is not enough:"
                - list [ref=e272]:
