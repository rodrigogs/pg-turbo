                    - /url: "#parsing-configuration"
                - paragraph [ref=e789]: If the default parsing does not suit your needs, there are some behaviours to support other usage patterns.
                - paragraph [ref=e790]:
                  - text: By default, program options are recognised before and after subcommands. To only look for program options before subcommands, use
                  - code [ref=e791]: .enablePositionalOptions()
                  - text: . This lets you use an option for a different purpose in subcommands.
                - paragraph [ref=e792]:
                  - text: "Example file:"
                  - link "positional-options.js" [ref=e793] [cursor=pointer]:
                    - /url: https://github.com/tj/commander.js/blob/HEAD/examples/positional-options.js
                - paragraph [ref=e794]:
                  - text: With positional options, the
                  - code [ref=e795]: "-b"
                  - text: "is a program option in the first line and a subcommand option in the second line:"
                - generic [ref=e797]: program -b subcommand program subcommand -b
                - paragraph [ref=e798]:
                  - text: By default, options are recognised before and after command-arguments. To only process options that come before the command-arguments, use
                  - code [ref=e799]: .passThroughOptions()
                  - text: . This lets you pass the arguments and following options through to another program without needing to use
                  - code [ref=e800]: "--"
                  - text: to end the option processing. To use pass through options in a subcommand, the program needs to enable positional options.
                - paragraph [ref=e801]:
                  - text: "Example file:"
                  - link "pass-through-options.js" [ref=e802] [cursor=pointer]:
                    - /url: https://github.com/tj/commander.js/blob/HEAD/examples/pass-through-options.js
                - paragraph [ref=e803]:
                  - text: With pass through options, the
                  - code [ref=e804]: "--port=80"
                  - text: "is a program option in the first line and passed through as a command-argument in the second line:"
                - generic [ref=e806]: program --port=80 arg program arg --port=80
                - paragraph [ref=e807]:
                  - text: By default, the option processing shows an error for an unknown option. To have an unknown option treated as an ordinary command-argument and continue looking for options, use
                  - code [ref=e808]: .allowUnknownOption()
                  - text: . This lets you mix known and unknown options.
                - paragraph [ref=e809]:
                  - text: By default, the argument processing displays an error for more command-arguments than expected. To suppress the error for excess arguments, use
                  - code [ref=e810]: .allowExcessArguments()
                  - text: .
