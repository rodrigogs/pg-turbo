          - heading "13.3.2. Row-Level Locks" [level=3] [ref=e427]
          - paragraph [ref=e428]:
            - text: In addition to table-level locks, there are row-level locks, which are listed as below with the contexts in which they are used automatically by PostgreSQL. See
            - link "Table 13.3" [ref=e429] [cursor=pointer]:
              - /url: explicit-locking.html#ROW-LOCK-COMPATIBILITY
            - text: for a complete table of row-level lock conflicts. Note that a transaction can hold conflicting locks on the same row, even in different subtransactions; but other than that, two transactions can never hold conflicting locks on the same row. Row-level locks do not affect data querying; they block only
            - emphasis [ref=e431]: writers and lockers
            - text: to the same row. Row-level locks are released at transaction end or during savepoint rollback, just like table-level locks.
