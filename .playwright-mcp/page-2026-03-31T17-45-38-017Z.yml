        - generic [ref=e540]:
          - heading "13.3.3. Page-Level Locks" [level=3] [ref=e544]
          - paragraph [ref=e545]: In addition to table and row locks, page-level share/exclusive locks are used to control read/write access to table pages in the shared buffer pool. These locks are released immediately after a row is fetched or updated. Application developers normally need not be concerned with page-level locks, but they are mentioned here for completeness.
        - generic [ref=e546]:
          - heading "13.3.4. Deadlocks" [level=3] [ref=e550]
          - paragraph [ref=e551]:
            - text: The use of explicit locking can increase the likelihood of
            - emphasis [ref=e552]: deadlocks
            - text: ", wherein two (or more) transactions each hold locks that the other wants. For example, if transaction 1 acquires an exclusive lock on table A and then tries to acquire an exclusive lock on table B, while transaction 2 has already exclusive-locked table B and now wants an exclusive lock on table A, then neither one can proceed. PostgreSQL automatically detects deadlock situations and resolves them by aborting one of the transactions involved, allowing the other(s) to complete. (Exactly which transaction will be aborted is difficult to predict and should not be relied upon.)"
          - paragraph [ref=e553]: "Note that deadlocks can also occur as the result of row-level locks (and thus, they can occur even if explicit locking is not used). Consider the case in which two concurrent transactions modify a table. The first transaction executes:"
          - generic [ref=e554]: UPDATE accounts SET balance = balance + 100.00 WHERE acctnum = 11111;
          - paragraph [ref=e555]: "This acquires a row-level lock on the row with the specified account number. Then, the second transaction executes:"
          - generic [ref=e556]: UPDATE accounts SET balance = balance + 100.00 WHERE acctnum = 22222; UPDATE accounts SET balance = balance - 100.00 WHERE acctnum = 11111;
          - paragraph [ref=e557]:
            - text: The first
            - code [ref=e558]: UPDATE
            - text: statement successfully acquires a row-level lock on the specified row, so it succeeds in updating that row. However, the second
            - code [ref=e559]: UPDATE
            - text: "statement finds that the row it is attempting to update has already been locked, so it waits for the transaction that acquired the lock to complete. Transaction two is now waiting on transaction one to complete before it continues execution. Now, transaction one executes:"
          - generic [ref=e560]: UPDATE accounts SET balance = balance - 100.00 WHERE acctnum = 22222;
          - paragraph [ref=e561]: "Transaction one attempts to acquire a row-level lock on the specified row, but it cannot: transaction two already holds such a lock. So it waits for transaction two to complete. Thus, transaction one is blocked on transaction two, and transaction two is blocked on transaction one: a deadlock condition. PostgreSQL will detect this situation and abort one of the transactions."
          - paragraph [ref=e562]: The best defense against deadlocks is generally to avoid them by being certain that all applications using a database acquire locks on multiple objects in a consistent order. In the example above, if both transactions had updated the rows in the same order, no deadlock would have occurred. One should also ensure that the first lock acquired on an object in a transaction is the most restrictive mode that will be needed for that object. If it is not feasible to verify this in advance, then deadlocks can be handled on-the-fly by retrying transactions that abort due to deadlocks.
          - paragraph [ref=e563]: So long as no deadlock situation is detected, a transaction seeking either a table-level or row-level lock will wait indefinitely for conflicting locks to be released. This means it is a bad idea for applications to hold transactions open for long periods of time (e.g., while waiting for user input).
        - generic [ref=e564]:
          - heading "13.3.5. Advisory Locks" [level=3] [ref=e568]
          - paragraph [ref=e569]:
            - text: PostgreSQL provides a means for creating locks that have application-defined meanings. These are called
            - emphasis [ref=e570]: advisory locks
            - text: ", because the system does not enforce their use — it is up to the application to use them correctly. Advisory locks can be useful for locking strategies that are an awkward fit for the MVCC model. For example, a common use of advisory locks is to emulate pessimistic locking strategies typical of so-called"
            - generic [ref=e571]: “flat file”
            - text: data management systems. While a flag stored in a table could be used for the same purpose, advisory locks are faster, avoid table bloat, and are automatically cleaned up by the server at the end of the session.
          - paragraph [ref=e572]: "There are two ways to acquire an advisory lock in PostgreSQL: at session level or at transaction level. Once acquired at session level, an advisory lock is held until explicitly released or the session ends. Unlike standard lock requests, session-level advisory lock requests do not honor transaction semantics: a lock acquired during a transaction that is later rolled back will still be held following the rollback, and likewise an unlock is effective even if the calling transaction fails later. A lock can be acquired multiple times by its owning process; for each completed lock request there must be a corresponding unlock request before the lock is actually released. Transaction-level lock requests, on the other hand, behave more like regular lock requests: they are automatically released at the end of the transaction, and there is no explicit unlock operation. This behavior is often more convenient than the session-level behavior for short-term usage of an advisory lock. Session-level and transaction-level lock requests for the same advisory lock identifier will block each other in the expected way. If a session already holds a given advisory lock, additional requests by it will always succeed, even if other sessions are awaiting the lock; this statement is true regardless of whether the existing lock hold and new request are at session level or transaction level."
          - paragraph [ref=e573]:
            - text: Like all locks in PostgreSQL, a complete list of advisory locks currently held by any session can be found in the
            - link "pg_locks" [ref=e574] [cursor=pointer]:
              - /url: view-pg-locks.html
              - code [ref=e575]: pg_locks
            - text: system view.
          - paragraph [ref=e576]:
            - text: Both advisory locks and regular locks are stored in a shared memory pool whose size is defined by the configuration variables
            - link "max_locks_per_transaction" [ref=e577] [cursor=pointer]:
              - /url: runtime-config-locks.html#GUC-MAX-LOCKS-PER-TRANSACTION
            - text: and
            - link "max_connections" [ref=e578] [cursor=pointer]:
              - /url: runtime-config-connection.html#GUC-MAX-CONNECTIONS
            - text: . Care must be taken not to exhaust this memory or the server will be unable to grant any locks at all. This imposes an upper limit on the number of advisory locks grantable by the server, typically in the tens to hundreds of thousands depending on how the server is configured.
          - paragraph [ref=e579]:
            - text: In certain cases using advisory locking methods, especially in queries involving explicit ordering and
            - code [ref=e580]: LIMIT
            - text: "clauses, care must be taken to control the locks acquired because of the order in which SQL expressions are evaluated. For example:"
          - generic [ref=e581]: SELECT pg_advisory_lock(id) FROM foo WHERE id = 12345; -- ok SELECT pg_advisory_lock(id) FROM foo WHERE id > 12345 LIMIT 100; -- danger! SELECT pg_advisory_lock(q.id) FROM ( SELECT id FROM foo WHERE id > 12345 LIMIT 100 ) q; -- ok
          - paragraph [ref=e582]:
            - text: In the above queries, the second form is dangerous because the
            - code [ref=e583]: LIMIT
            - text: is not guaranteed to be applied before the locking function is executed. This might cause some locks to be acquired that the application was not expecting, and hence would fail to release (until it ends the session). From the point of view of the application, such locks would be dangling, although still viewable in
            - code [ref=e584]: pg_locks
            - text: .
          - paragraph [ref=e585]:
            - text: The functions provided to manipulate advisory locks are described in
            - link "Section 9.27.10" [ref=e586] [cursor=pointer]:
              - /url: functions-admin.html#FUNCTIONS-ADVISORY-LOCKS
            - text: .
