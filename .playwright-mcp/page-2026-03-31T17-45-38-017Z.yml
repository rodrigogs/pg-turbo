        - heading "13.3. Explicit Locking" [level=2] [ref=e108]
        - generic [ref=e110]:
          - term [ref=e111]:
            - link "13.3.1. Table-Level Locks" [ref=e113] [cursor=pointer]:
              - /url: explicit-locking.html#LOCKING-TABLES
          - term [ref=e114]:
            - link "13.3.2. Row-Level Locks" [ref=e116] [cursor=pointer]:
              - /url: explicit-locking.html#LOCKING-ROWS
          - term [ref=e117]:
            - link "13.3.3. Page-Level Locks" [ref=e119] [cursor=pointer]:
              - /url: explicit-locking.html#LOCKING-PAGES
          - term [ref=e120]:
            - link "13.3.4. Deadlocks" [ref=e122] [cursor=pointer]:
              - /url: explicit-locking.html#LOCKING-DEADLOCKS
          - term [ref=e123]:
            - link "13.3.5. Advisory Locks" [ref=e125] [cursor=pointer]:
              - /url: explicit-locking.html#ADVISORY-LOCKS
        - paragraph [ref=e126]:
          - text: PostgreSQL provides various lock modes to control concurrent access to data in tables. These modes can be used for application-controlled locking in situations where MVCC does not give the desired behavior. Also, most PostgreSQL commands automatically acquire locks of appropriate modes to ensure that referenced tables are not dropped or modified in incompatible ways while the command executes. (For example,
          - code [ref=e127]: TRUNCATE
          - text: cannot safely be executed concurrently with other operations on the same table, so it obtains an
          - code [ref=e128]: ACCESS EXCLUSIVE
          - text: lock on the table to enforce that.)
        - paragraph [ref=e129]:
          - text: To examine a list of the currently outstanding locks in a database server, use the
          - link "pg_locks" [ref=e130] [cursor=pointer]:
            - /url: view-pg-locks.html
            - code [ref=e131]: pg_locks
          - text: system view. For more information on monitoring the status of the lock manager subsystem, refer to
          - link "Chapter 28" [ref=e132] [cursor=pointer]:
            - /url: monitoring.html
          - text: .
        - generic [ref=e133]:
          - heading "13.3.1. Table-Level Locks" [level=3] [ref=e137]
          - paragraph [ref=e138]:
            - text: The list below shows the available lock modes and the contexts in which they are used automatically by PostgreSQL. You can also acquire any of these locks explicitly with the command
            - link "LOCK" [ref=e139] [cursor=pointer]:
              - /url: sql-lock.html
            - text: . Remember that all of these lock modes are table-level locks, even if the name contains the word
            - generic [ref=e140]: “row”
            - text: ; the names of the lock modes are historical. To some extent the names reflect the typical usage of each lock mode — but the semantics are all the same. The only real difference between one lock mode and another is the set of lock modes with which each conflicts (see
            - link "Table 13.2" [ref=e141] [cursor=pointer]:
              - /url: explicit-locking.html#TABLE-LOCK-COMPATIBILITY
            - text: ). Two transactions cannot hold locks of conflicting modes on the same table at the same time. (However, a transaction never conflicts with itself. For example, it might acquire
            - code [ref=e142]: ACCESS EXCLUSIVE
            - text: lock and later acquire
            - code [ref=e143]: ACCESS SHARE
            - text: lock on the same table.) Non-conflicting lock modes can be held concurrently by many transactions. Notice in particular that some lock modes are self-conflicting (for example, an
            - code [ref=e144]: ACCESS EXCLUSIVE
            - text: lock cannot be held by more than one transaction at a time) while others are not self-conflicting (for example, an
            - code [ref=e145]: ACCESS SHARE
            - text: lock can be held by multiple transactions).
