                - generic [ref=e138]:
                  - heading "Only use the SQL syntax parser" [level=2] [ref=e139]
                  - 'link "Permalink: Only use the SQL syntax parser" [ref=e140] [cursor=pointer]':
                    - /url: "#only-use-the-sql-syntax-parser"
                - paragraph [ref=e141]:
                  - text: ❤ Head to the
                  - link "pgsql-ast-parser" [ref=e142] [cursor=pointer]:
                    - /url: https://github.com/oguimbal/pgsql-ast-parser
                  - text: repo
                - generic [ref=e143]:
                  - heading "⚠ Disclaimer" [level=2] [ref=e144]
                  - 'link "Permalink: ⚠ Disclaimer" [ref=e145] [cursor=pointer]':
                    - /url: "#-disclaimer"
                - paragraph [ref=e146]:
                  - text: The sql syntax parser is
                  - link "home-made" [ref=e147] [cursor=pointer]:
                    - /url: https://github.com/oguimbal/pgsql-ast-parser
                  - text: . Which means that some features are not implemented, and will be considered as invalid syntaxes.
                - paragraph [ref=e148]: This lib is quite new, so forgive it if some obvious pg syntax is not supported !
                - paragraph [ref=e149]: ... And open an issue if you feel like a feature should be implemented :)
                - paragraph [ref=e150]: Moreover, even if I wrote hundreds of tests, keep in mind that this implementation is a best effort to replicate PG. Keep an eye on your query results if you perform complex queries. Please file issues if some results seem incoherent with what should be returned.
                - paragraph [ref=e151]: Finally, I invite you to read the below section to have an idea of you can or cannot do.
                - generic [ref=e152]:
                  - heading "🔍 Features" [level=1] [ref=e153]
                  - 'link "Permalink: 🔍 Features" [ref=e154] [cursor=pointer]':
                    - /url: "#-features"
                - generic [ref=e155]:
                  - heading "Rollback to a previous state" [level=2] [ref=e156]
                  - 'link "Permalink: Rollback to a previous state" [ref=e157] [cursor=pointer]':
                    - /url: "#rollback-to-a-previous-state"
                - paragraph [ref=e158]:
                  - code [ref=e159]: pg-mem
                  - text: uses immutable data structures (
                  - link "here" [ref=e160] [cursor=pointer]:
                    - /url: https://www.npmjs.com/package/immutable
                  - text: and
                  - link "here" [ref=e161] [cursor=pointer]:
                    - /url: https://www.npmjs.com/package/functional-red-black-tree
                  - text: ), which means that you can have restore points for free!
                - paragraph [ref=e162]:
                  - text: This is super useful if you intend to use
                  - code [ref=e163]: pg-mem
                  - text: to mock your database for unit tests.
                - paragraph [ref=e164]: "You could:"
                - list [ref=e165]:
                  - listitem [ref=e166]: Create your schema only once (which could be a heavy operation for a single unit test)
                  - listitem [ref=e167]: Insert test data which will be shared by all test
                  - listitem [ref=e168]: Create a restore point
                  - listitem [ref=e169]:
                    - text: Run your tests with the same db instance, executing a
                    - code [ref=e170]: backup.restore()
                    - text: before each test (which instantly resets db to the state it has after creating the restore point)
                - paragraph [ref=e171]: "Usage:"
                - generic [ref=e173]: "const db = newDb(); db.public.none(`create table test(id text); insert into test values ('value');`); // create a restore point & mess with data const backup = db.backup(); db.public.none(`update test set id='new value';`); // restore it ! backup.restore(); db.public.many(`select * from test`); // => {test: 'value'}"
                - generic [ref=e174]:
                  - heading "Custom functions" [level=2] [ref=e175]
                  - 'link "Permalink: Custom functions" [ref=e176] [cursor=pointer]':
                    - /url: "#custom-functions"
                - paragraph [ref=e177]: "You can declare custom functions like this:"
                - generic [ref=e179]: "db.public.registerFunction({ name: \"say_hello\", args: [DataType.text], returns: DataType.text, implementation: (x) => \"hello \" + x, });"
                - paragraph [ref=e180]:
                  - text: And then use them like in SQL
                  - code [ref=e181]: select say_hello('world')
                  - text: .
                - paragraph [ref=e182]: Custom functions support overloading and variadic arguments.
                - paragraph [ref=e183]: ⚠ However, the value you return is not type checked. It MUST correspond to the datatype you provided as 'returns' (it won't fail if not, but could lead to weird bugs).
                - generic [ref=e184]:
                  - heading "Custom types" [level=2] [ref=e185]
                  - 'link "Permalink: Custom types" [ref=e186] [cursor=pointer]':
                    - /url: "#custom-types"
                - paragraph [ref=e187]: Not all pg types are implemented in pg-mem. That said, most of the types are often equivalent to other types, with a format validation. pg-mem provides a way to register such types.
                - paragraph [ref=e188]: For instance, lets say you'd like to register the MACADDR type, which is basically a string, with a format constraint.
                - paragraph [ref=e189]: "You can register it like this:"
                - generic [ref=e191]: "db.public.registerEquivalentType({ name: \"macaddr\", // which type is it equivalent to (will be able to cast it from it) equivalentTo: DataType.text, isValid(val: string) { // check that it will be this format return isValidMacAddress(val); }, });"
                - paragraph [ref=e192]: "Doing so, you'll be able to do things such as:"
                - generic [ref=e194]:
                  - text: SELECT
                  - generic [ref=e195]: "'08:00:2b:01:02:03:04:05'"
                  - text: ::macaddr;
                  - generic [ref=e196]: "-- WORKS"
                  - text: SELECT
                  - generic [ref=e197]: "'invalid'"
                  - text: ::macaddr;
                  - generic [ref=e198]: "-- will throw a conversion error"
                - paragraph [ref=e199]:
                  - text: "If you feel your implementation of a type matches the standard, and would like to include it in pg-mem for others to enjoy it, please consider filing a pull request ! (tip: see the"
                  - link "INET" [ref=e200] [cursor=pointer]:
                    - /url: https://github.com/oguimbal/pg-mem/blob/master/src/datatypes/t-inet.ts
                  - text: type implementation as an example, and the
                  - link "pg_catalog index" [ref=e201] [cursor=pointer]:
                    - /url: https://github.com/oguimbal/pg-mem/blob/master/src/schema/pg-catalog/index.ts
                  - text: where supported types are registered)
                - generic [ref=e202]:
                  - heading "Extensions" [level=2] [ref=e203]
                  - 'link "Permalink: Extensions" [ref=e204] [cursor=pointer]':
                    - /url: "#extensions"
                - paragraph [ref=e205]: "No native extension is implemented (pull requests are welcome), but you can define kind-of extensions like this:"
                - generic [ref=e207]: "db.registerExtension(\"my-ext\", (schema) => { // install your ext in 'schema' // ex: schema.registerFunction(...) });"
                - paragraph [ref=e208]:
                  - text: Statements like
                  - code [ref=e209]: create extension "my-ext"
                  - text: will then be supported.
                - generic [ref=e210]:
                  - heading "📃 Libraries adapters" [level=1] [ref=e211]
                  - 'link "Permalink: 📃 Libraries adapters" [ref=e212] [cursor=pointer]':
                    - /url: "#-libraries-adapters"
                - paragraph [ref=e213]: pg-mem provides handy shortcuts to create instances of popular libraries that will be bound to pg-mem instead of a real postgres db.
                - list [ref=e214]:
                  - listitem [ref=e215]: pg-native
                  - listitem [ref=e216]: node-postgres (pg)
                  - listitem [ref=e217]: pg-promise (pgp)
                  - listitem [ref=e218]: slonik
                  - listitem [ref=e219]: typeorm
                  - listitem [ref=e220]: knex
                  - listitem [ref=e221]: kysely
                  - listitem [ref=e222]: mikro-orm
                - paragraph [ref=e223]:
                  - link "See the wiki for more details" [ref=e224] [cursor=pointer]:
                    - /url: https://github.com/oguimbal/pg-mem/wiki/Libraries-adapters
                - generic [ref=e225]:
                  - heading "💥 Inspection" [level=1] [ref=e226]
                  - 'link "Permalink: 💥 Inspection" [ref=e227] [cursor=pointer]':
                    - /url: "#-inspection"
                - generic [ref=e228]:
                  - heading "Intercept queries" [level=2] [ref=e229]
                  - 'link "Permalink: Intercept queries" [ref=e230] [cursor=pointer]':
                    - /url: "#intercept-queries"
                - paragraph [ref=e231]: "If you would like to hook your database, and return ad-hoc results, you can do so like this:"
                - generic [ref=e233]: "const db = newDb(); db.public.interceptQueries((sql) => { if (sql === \"select * from whatever\") { // intercept this statement, and return something custom: return [{ something: 42 }]; } // proceed to actual SQL execution for other requests. return null; });"
                - generic [ref=e234]:
                  - heading "Inspect a table" [level=2] [ref=e235]
                  - 'link "Permalink: Inspect a table" [ref=e236] [cursor=pointer]':
                    - /url: "#inspect-a-table"
                - paragraph [ref=e237]:
                  - text: You can manually inspect a table content using the
                  - code [ref=e238]: find()
                  - text: "method:"
                - generic [ref=e240]: "for (const item of db.public.getTable<TItem>(\"mytable\").find(itemTemplate)) { console.log(item); }"
                - generic [ref=e241]:
                  - heading "Manually insert items" [level=2] [ref=e242]
                  - 'link "Permalink: Manually insert items" [ref=e243] [cursor=pointer]':
                    - /url: "#manually-insert-items"
                - paragraph [ref=e244]: "If you'd like to insert items manually into a table, you can do this like that:"
                - generic [ref=e246]: "db.public.getTable<TItem>('mytable').insert({ /* item to insert */ }))"
                - generic [ref=e247]:
                  - heading "Subscribe to events" [level=2] [ref=e248]
                  - 'link "Permalink: Subscribe to events" [ref=e249] [cursor=pointer]':
                    - /url: "#subscribe-to-events"
                - paragraph [ref=e250]: "You can subscribe to some events, like:"
                - generic [ref=e252]: "const db = newDb(); // called on each successful sql request db.on(\"query\", (sql) => {}); // called on each failed sql request db.on(\"query-failed\", (sql) => {}); // called on schema changes db.on(\"schema-change\", () => {}); // called when a CREATE EXTENSION schema is encountered. db.on(\"create-extension\", (ext) => {});"
                - generic [ref=e253]:
                  - heading "Experimental events" [level=2] [ref=e254]
                  - 'link "Permalink: Experimental events" [ref=e255] [cursor=pointer]':
                    - /url: "#experimental-events"
                - paragraph [ref=e256]:
                  - code [ref=e257]: pg-mem
                  - text: implements a basic support for indices.
                - paragraph [ref=e258]: These handlers are called when a request cannot be optimized using one of the created indices.
                - paragraph [ref=e259]:
                  - text: However, a real postgres instance will be much smarter to optimize its requests... so when
                  - code [ref=e260]: pg-mem
                  - text: says "this request does not use an index", dont take my word for it.
                - generic [ref=e262]: "// called when a table is iterated entirely (ex: 'select * from data where notIndex=3' triggers it) db.on('seq-scan', () => {}); // same, but on a specific table db.getTable('myTable').on('seq-scan', () = {}); // will be called if pg-mem did not find any way to optimize a join // (which leads to a O(n*m) lookup with the current implementation) db.on('catastrophic-join-optimization', () => {});"
                - generic [ref=e263]:
